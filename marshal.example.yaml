# ollama-marshal configuration
# All values shown are defaults — omit any section to use defaults.
# Every value can be overridden via environment variables with the MARSHAL_ prefix.
# Example: MARSHAL_PROXY_PORT=11435, MARSHAL_MEMORY_SAFETY_MARGIN=4GB

# Ollama connection
ollama:
  host: "http://localhost:11434"    # MARSHAL_OLLAMA_HOST

# Proxy settings
proxy:
  host: "0.0.0.0"                  # MARSHAL_PROXY_HOST
  port: 11435                       # MARSHAL_PROXY_PORT
  request_timeout_s: 3600          # MARSHAL_PROXY_REQUEST_TIMEOUT_S — server-side max
                                    # wait for a queued request, in seconds. Default 1h.
                                    # Returns 504 if exceeded. Clients can override
                                    # per-request via the X-Request-Timeout header.

# Memory management
memory:
  # total_ram is auto-detected. Set to override (e.g., "64GB").
  # total_ram: "64GB"              # MARSHAL_MEMORY_TOTAL_RAM
  os_overhead: "4GB"               # MARSHAL_MEMORY_OS_OVERHEAD — reserved for OS
  safety_margin: "2GB"             # MARSHAL_MEMORY_SAFETY_MARGIN — buffer
  poll_interval: 5                 # MARSHAL_MEMORY_POLL_INTERVAL — seconds between /api/ps polls

# Scheduler
scheduler:
  max_skips: 3                     # MARSHAL_SCHEDULER_MAX_SKIPS — per-request skip limit
  model_detect_interval: 30        # MARSHAL_SCHEDULER_MODEL_DETECT_INTERVAL — seconds between /api/tags polls
  idle_eviction_minutes: 15        # MARSHAL_SCHEDULER_IDLE_EVICTION_MINUTES — unload a model
                                    # after this many minutes of no activity. 0 disables
                                    # time-based eviction (only memory-pressure eviction).
                                    # Models with pending requests are never time-evicted.
  parallel_per_model: 1            # MARSHAL_SCHEDULER_PARALLEL_PER_MODEL — max concurrent
                                    # inference dispatches to a single loaded model. Default 1
                                    # = v0.2.x sequential behavior. To unlock parallel execution:
                                    # 1. Start Ollama with OLLAMA_NUM_PARALLEL >= this value
                                    #    (so Ollama allocates enough KV cache slots).
                                    # 2. Raise this value to match.
                                    # Marshal scales actual concurrency with queue depth (a
                                    # 1-envelope queue still serves 1 at a time).
  burst_hint_ttl_s: 30.0           # MARSHAL_SCHEDULER_BURST_HINT_TTL_S — seconds an
                                    # X-Burst-Size hint stays active without renewal. Programs
                                    # that pace tool-calling slower than this need to raise it.
  burst_hint_cap_multiplier: 4     # Per-pair burst cap = max_skips × this (default 12).
  burst_hint_aggregate_multiplier: 8  # Per-model summed cap = max_skips × this (default 24).
                                       # Defends against program_id-flooding attacks.
  burst_hint_max_live: 256         # Max live (program, model) hints stored. New pairs are
                                    # dropped when full; existing pair refreshes always succeed.
  metrics_path: "~/.ollama-marshal/metrics.json"   # MARSHAL_SCHEDULER_METRICS_PATH —
                                                    # where lifetime counters persist across
                                                    # restarts.
  metrics_persist_interval_s: 60.0 # MARSHAL_SCHEDULER_METRICS_PERSIST_INTERVAL_S — seconds
                                    # between background metrics snapshots. Lower = tighter
                                    # crash recovery, higher = less disk wear.

# Per-program configuration
# Programs identify themselves via the X-Program-ID header.
# Programs not listed here use the "default" settings.
programs:
  default:
    priority: normal               # normal | critical
  # Example: give your coding assistant critical priority
  # coding-assistant:
  #   priority: critical
  # Example: batch jobs stay at normal priority
  # batch-processor:
  #   priority: normal

# Shutdown behavior
shutdown:
  mode: drain                      # MARSHAL_SHUTDOWN_MODE — drain | immediate
  drain_timeout: 30                # MARSHAL_SHUTDOWN_DRAIN_TIMEOUT — seconds (drain mode only)
  unload_models: true              # MARSHAL_SHUTDOWN_UNLOAD_MODELS — unload all models on exit

# Logging
logging:
  level: INFO                      # MARSHAL_LOGGING_LEVEL — DEBUG | INFO | WARNING | ERROR
  format: console                  # MARSHAL_LOGGING_FORMAT — console (colored) | json

# Audit log (optional, off by default).
# When enabled, marshal appends one JSON record per request lifecycle event
# to a JSONL file. Records contain METADATA ONLY — never prompt text or
# response content — so the audit file is safe to share with compliance
# teams or store long-term.
audit:
  enabled: false                   # MARSHAL_AUDIT_ENABLED — opt-in feature flag
  path: "~/.ollama-marshal/audit.jsonl"   # MARSHAL_AUDIT_PATH — JSONL output file
  retention_days: 30               # MARSHAL_AUDIT_RETENTION_DAYS — auto-delete entries
                                    # older than N days. 0 disables retention.
  max_size_mb: 100                 # MARSHAL_AUDIT_MAX_SIZE_MB — rotate the audit file
                                    # (.1, .2, ... up to 5 generations) when it exceeds
                                    # this size. 0 disables rotation.
