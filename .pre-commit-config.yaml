ci:
  autoupdate_schedule: weekly
  skip: [mypy]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin matches the dev environment's ruff (15.x) so the hook doesn't
    # disagree with `make lint` on rules that changed between versions
    # (e.g. PT001 fixture parens, TC vs TCH selector renames).
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [--strict, src/]
        pass_filenames: false

      # Run the unit test suite on EVERY commit (~10s). Catches
      # regressions before they reach the branch tip. Uses
      # `uv run --extra dev` to match the Makefile's pinned-version
      # invocation pattern.
      - id: pytest-unit
        name: pytest (unit tests, every commit)
        entry: uv run --extra dev pytest tests/ --ignore=tests/integration -q --no-cov
        language: system
        types: [python]
        pass_filenames: false

      # Run the integration test suite on every PUSH (~3min when prod
      # marshal isn't running, longer when it is). The autouse
      # `pause_local_prod_marshal` fixture (v0.6.3+) pauses any local
      # prod marshal at :11435 for the duration of the suite so it
      # doesn't compete for Ollama VRAM. Requires Ollama running on
      # localhost:11434.
      #
      # Operators can skip this hook with `git push --no-verify` for
      # WIP branches; the assumption is that PRs are pushed to ready
      # branches that should pass the suite cleanly.
      - id: pytest-integration
        name: pytest (integration tests, on push)
        entry: uv run --extra dev pytest tests/integration/ -m integration -q --no-cov
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
