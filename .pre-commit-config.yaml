ci:
  autoupdate_schedule: weekly
  skip: [mypy]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin matches the dev environment's ruff (15.x) so the hook doesn't
    # disagree with `make lint` on rules that changed between versions
    # (e.g. PT001 fixture parens, TC vs TCH selector renames).
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [--strict, src/]
        pass_filenames: false

      # Run the unit test suite on EVERY commit (~10s). Catches
      # regressions before they reach the branch tip. Uses
      # `uv run --extra dev` to match the Makefile's pinned-version
      # invocation pattern.
      - id: pytest-unit
        name: pytest (unit tests, every commit)
        entry: uv run --extra dev pytest tests/ --ignore=tests/integration -q --no-cov
        language: system
        types: [python]
        pass_filenames: false

      # NOTE: A pre-push integration test hook is INTENTIONALLY NOT
      # configured. Integration tests share Ollama at :11434 with any
      # local prod marshal at :11435, and the cross-suite contamination
      # causes false-failures (and sometimes prod errors) on every push.
      # The fix lives in v0.6.3: a pytest session-scoped fixture that
      # pauses prod marshal via the v0.6.0 admin/pause endpoint, runs
      # the suite, then resumes. Once that lands, the pre-push hook
      # comes back. Until then, run `make pre-pr` manually before
      # opening a PR.
