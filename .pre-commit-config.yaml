ci:
  autoupdate_schedule: weekly
  skip: [mypy]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [--strict, src/]
        pass_filenames: false

      # Run the unit test suite on push (NOT every commit — keeps
      # commits fast). The integration test suite is excluded since
      # it requires a running Ollama; run `make test-integration`
      # locally before opening a PR.
      #
      # Install push hooks via: `pre-commit install --hook-type pre-push`
      - id: pytest-unit
        name: pytest (unit tests, on push)
        entry: pytest tests/ --ignore=tests/integration -q --no-cov
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
