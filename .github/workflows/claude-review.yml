name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          use_sticky_comment: true
          prompt: |
            Review this PR against CLAUDE.md (the project's living rulebook).
            Required reading for every review:

            - "Code Conventions" — type hints, async, structlog, line length,
              test naming
            - "Python Conventions" — Pydantic v2, exception handling, async I/O,
              resource management, Python idioms
            - "Testing Rules" — mock the Ollama HTTP boundary only, never
              internal modules
            - "Documentation Rules" — every PR keeps CHANGELOG.md, README.md,
              CLAUDE.md, and marshal.example.yaml in sync with code changes
            - "Versioning" — SemVer rules and per-PR workflow (add to [Unreleased],
              don't bump version in feature PRs)
            - "Safety Rules" and "Bright-line Bug Patterns" — flag these
              aggressively, no false-positive concerns; these are project-specific
              anti-patterns we want caught every time

            Beyond the rules, use independent judgment for:
            - Real bugs, race conditions, edge cases the rules don't cover
            - Security vulnerabilities (injection, secret exposure, trust
              boundary violations)
            - Test coverage gaps for new code (95% target)
            - User-visible changes shipped without a CHANGELOG.md [Unreleased] entry

            How to deliver findings (REQUIRED — without this the review is
            invisible):

            1. For each concrete finding tied to specific lines, call
               `mcp__github_inline_comment__create_inline_comment` with the
               file path, line number, and comment body. Include the severity
               (CRITICAL / INFORMATIONAL) and a one-line fix suggestion.
            2. After posting any inline comments, call
               `mcp__github__update_claude_comment` (or post a top-level PR
               comment) with a short summary: how many findings, severity
               breakdown, and overall verdict (LGTM / changes requested).
            3. If you find no issues at all, still post a one-line summary
               saying so — "Reviewed against CLAUDE.md. No findings." — so the
               PR author knows the review actually ran and concluded.

            Do NOT silently complete. The default behavior of this action
            buffers inline comments for posting; if you don't call the comment
            tools, nothing is posted and the review is wasted.
