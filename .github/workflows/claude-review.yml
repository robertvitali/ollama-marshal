name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          # track_progress posts a live progress comment AND wires Claude into
          # the action's built-in inline-comment-classifier pipeline. Without
          # this, custom prompts complete silently — the action buffers inline
          # comments expecting Claude to use the action's posting machinery,
          # and a custom prompt that doesn't trigger it just produces "No
          # buffered inline comments" at the end of the run.
          track_progress: true
          claude_args: --allowedTools mcp__github_inline_comment__create_inline_comment
          # Project-specific review focus only. The action injects its own
          # standard review boilerplate ("review the diff and post inline
          # comments"); this prompt narrows what to look for.
          prompt: |
            Review this PR against CLAUDE.md (the project's living rulebook).
            Focus your review on:

            - "Bright-line Bug Patterns" — flag any of the 14 listed
              anti-patterns aggressively (mocking internal logic, endpoint
              not registered, config field not in marshal.example.yaml,
              missing CHANGELOG, hardcoded values, time.sleep in async, bare
              except, print(), f-strings in log messages, missing tests for
              new modules, forgotten keep_alive override, doc drift, version
              drift, wrong bump for the change).
            - "Code Conventions" and "Python Conventions" — type hints, async
              correctness, structlog usage, Pydantic v2, line length 88.
            - "Documentation Rules" — every PR keeps CHANGELOG.md, README.md,
              CLAUDE.md, and marshal.example.yaml in sync.
            - "Testing Rules" — mock the Ollama HTTP boundary only, never
              internal `ollama_marshal.*` modules. 95% coverage target.
            - "Versioning" — pre-1.0 SemVer rules. Don't bump version in
              feature PRs (add to [Unreleased] instead).

            Beyond the rules, also flag:
            - Real bugs, race conditions, edge cases the rules don't cover
            - Security vulnerabilities (injection, secret exposure, trust
              boundary violations)
            - Test coverage gaps for new code
