name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          # track_progress: forces "tag mode" with a sticky tracking comment,
          # so something always posts (visible failure if review didn't run).
          track_progress: true
          # Allowlist: the inline-comment MCP tool + gh CLI for the summary.
          # Without `Bash(gh pr comment:*)` Claude can't post the top-level
          # summary, which is needed because the inline-comment buffer/
          # classifier path drops comments when the run ends on TodoWrite
          # (anthropics/claude-code-action#1087).
          claude_args: >-
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against CLAUDE.md (the project's living rulebook).
            Focus your review on:

            - "Bright-line Bug Patterns" — flag any of the 14 listed
              anti-patterns aggressively (mocking internal logic, endpoint
              not registered, config field not in marshal.example.yaml,
              missing CHANGELOG, hardcoded values, time.sleep in async, bare
              except, print(), f-strings in log messages, missing tests for
              new modules, forgotten keep_alive override, doc drift, version
              drift, wrong bump for the change).
            - "Code Conventions" and "Python Conventions" — type hints, async
              correctness, structlog usage, Pydantic v2, line length 88.
            - "Documentation Rules" — every PR keeps CHANGELOG.md, README.md,
              CLAUDE.md, and marshal.example.yaml in sync.
            - "Testing Rules" — mock the Ollama HTTP boundary only, never
              internal `ollama_marshal.*` modules. 95% coverage target.
            - "Versioning" — pre-1.0 SemVer rules. Don't bump version in
              feature PRs (add to [Unreleased] instead).

            Beyond the rules, also flag real bugs, race conditions,
            security issues, and test coverage gaps.

            HOW TO POST FINDINGS (do not skip — silent reviews are wasted):

            1. For each line-specific finding, call
               `mcp__github_inline_comment__create_inline_comment` with
               `confirmed: true` (REQUIRED — without confirmed=true the
               comment is buffered and may be silently dropped, see
               anthropics/claude-code-action#1087).
            2. For the top-level summary, run
               `gh pr comment <PR NUMBER> --body "<summary text>"` with a
               short verdict (LGTM / changes requested / N findings).
            3. Even if you find no issues, post the top-level summary
               saying "Reviewed against CLAUDE.md. No findings."
            4. End your turn with the gh pr comment call (or a normal text
               message). Do NOT end with TodoWrite or any other no-op tool —
               the SDK returns empty result and the post-step drops
               everything.
