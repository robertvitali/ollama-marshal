name: Claude Security Review

# Manual-trigger only — `pull_request` was removed to stop burning
# Anthropic API tokens on every PR. Run from the Actions UI with the
# PR's branch name when you specifically want a security pass.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Claude Security Review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          run-every-commit: true
